<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>家族旅行誌</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2060/2060206.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Playfair+Display:wght@700&display=swap');
        * { box-sizing: border-box; }
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #F5F2ED;
            color: #4A4A4A;
            margin: 0;
            padding: 32px 20px 60px;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; margin: 0 0 6px; }
        .header p { font-size: 13px; color: #9CA3AF; font-weight: bold; margin: 0; }
        .trip-list { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .trip-card {
            display: block; text-decoration: none; color: inherit;
            background: #fff; border-radius: 24px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); border: 1px solid rgba(255,255,255,0.6);
            transition: transform 0.15s;
        }
        .trip-card:active { transform: scale(0.98); }
        .trip-cover { height: 140px; width: 100%; object-fit: cover; display: block; }
        .trip-body { padding: 16px 18px; }
        .trip-tag { display: inline-block; font-size: 10px; font-weight: bold; padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; }
        .tag-upcoming { background: #FDECE3; color: #E09F7D; }
        .tag-past { background: #EEF2F0; color: #7A9E8E; }
        .trip-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: bold; margin: 0 0 4px; }
        .trip-meta { font-size: 12px; color: #9CA3AF; font-weight: bold; }
        .footer-note { text-align: center; margin-top: 40px; font-size: 11px; color: #B0B0B0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>家族旅行誌</h1>
        <p>A Universe Built By Family · 每段旅程都記錄下來</p>
    </div>

    <div class="trip-list">
        <a class="trip-card" href="trips/busan2026.html">
            <img class="trip-cover" src="https://images.unsplash.com/photo-1538485399081-7191377e8241?w=800&q=80" />
            <div class="trip-body">
                <span class="trip-tag tag-upcoming">即將出發</span>
                <div class="trip-title">釜山尋味之旅</div>
                <div class="trip-meta">2026/8/5 - 8/10 · 韓國</div>
            </div>
        </a>

        <a class="trip-card" href="trips/pattaya2026.html">
            <img class="trip-cover" src="https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=800&q=80" />
            <div class="trip-body">
                <span class="trip-tag tag-past">回憶中</span>
                <div class="trip-title">泰嘆芭堤雅</div>
                <div class="trip-meta">2026/2/13 - 2/18 · 泰國</div>
            </div>
        </a>
    </div>

    <div class="footer-note">每次旅行結束後，記得回來留下這次的回憶 🌙</div>
</body>
</html>
